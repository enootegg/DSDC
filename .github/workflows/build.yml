name: Build Installer

on:
  schedule:
    - cron: "0 6 */3 * *" # Кожні 3 дні о 6:00 UTC
  workflow_dispatch: # Ручний запуск одним кліком
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    environment: dsdc
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Download Sources from Cloudflare R2
        shell: bash
        run: aws s3 cp s3://ds-localizer-sources/resources.zip resources.zip --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Extract Sources (Windows)
        if: runner.os == 'Windows'
        run: Expand-Archive resources.zip -DestinationPath resources -Force

      - name: Extract Sources (Linux)
        if: runner.os == 'Linux'
        run: unzip -o resources.zip -d resources

      - name: Set version from Crowdin approval progress
        run: node scripts/set-version.js
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}

      - name: Build localization files
        run: node scripts/build-localization.js
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}

      - name: Set executable permissions for Decima binary
        if: runner.os == 'Linux'
        run: chmod +x resources/Decima_linux/bin/decima

      - name: Build installer
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Save version info
        if: runner.os == 'Linux'
        shell: bash
        run: |
          FULL=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$FULL"
          mkdir -p version-info
          echo "${MAJOR}.${MINOR}" > version-info/version.txt
          echo "${MINOR}" > version-info/progress.txt

      - name: Upload version info
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version-info/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Read version info
        id: version
        run: |
          echo "version=$(cat artifacts/version-info/version.txt)" >> "$GITHUB_OUTPUT"
          echo "progress=$(cat artifacts/version-info/progress.txt)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%d.%m.%Y')" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Українізатор Death Stranding v${{ steps.version.outputs.version }}"
          body: |
            Автоматична збірка від ${{ steps.version.outputs.date }}.
            Версія відповідає **${{ steps.version.outputs.progress }}%** затверджених перекладів на Crowdin.
          files: |
            artifacts/dist-Windows/*.exe
            artifacts/dist-Linux/*.AppImage
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
